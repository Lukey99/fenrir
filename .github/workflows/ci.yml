name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gym_tracker
          POSTGRES_PASSWORD: gym_tracker
          POSTGRES_DB: gym_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gym_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gym_tracker:gym_tracker@localhost:5432/gym_tracker
      AUTH_SECRET: ci-only-secret-never-used-outside-this-workflow
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed built-in exercises
        run: npm run db:seed

      - run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Production build
        run: npm run build
